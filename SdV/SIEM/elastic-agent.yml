agent:
  download:
    sourceURI: 'https://artifacts.elastic.co/downloads/'
  monitoring:
    enabled: true
    use_output: default
    namespace: default
    logs: true
    metrics: true
  features: {}
inputs:
  - id: logfile-system-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
    name: system-1
    revision: 1
    type: logfile
    use_output: default
    meta:
      package:
        name: system
        version: 1.31.1
    data_stream:
      namespace: default
    package_policy_id: b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
    streams:
      - id: logfile-system.auth-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.auth
          type: logs
        ignore_older: 72h
        paths:
          - /var/log/auth.log*
          - /var/log/secure*
        exclude_files:
          - .gz$
        multiline:
          pattern: ^\s
          match: after
        tags:
          - system-auth
        processors:
          - add_locale: null
      - id: logfile-system.syslog-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.syslog
          type: logs
        paths:
          - /var/log/messages*
          - /var/log/syslog*
          - /var/log/system*
        exclude_files:
          - .gz$
        multiline:
          pattern: ^\s
          match: after
        processors:
          - add_locale: null
        ignore_older: 72h
  - id: winlog-system-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
    name: system-1
    revision: 1
    type: winlog
    use_output: default
    meta:
      package:
        name: system
        version: 1.31.1
    data_stream:
      namespace: default
    package_policy_id: b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
    streams:
      - id: winlog-system.application-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        name: Application
        data_stream:
          dataset: system.application
          type: logs
        condition: '${host.platform} == ''windows'''
        ignore_older: 72h
      - id: winlog-system.security-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        name: Security
        data_stream:
          dataset: system.security
          type: logs
        condition: '${host.platform} == ''windows'''
        ignore_older: 72h
      - id: winlog-system.system-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        name: System
        data_stream:
          dataset: system.system
          type: logs
        condition: '${host.platform} == ''windows'''
        ignore_older: 72h
  - id: system/metrics-system-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
    name: system-1
    revision: 1
    type: system/metrics
    use_output: default
    meta:
      package:
        name: system
        version: 1.31.1
    data_stream:
      namespace: default
    package_policy_id: b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
    streams:
      - id: system/metrics-system.cpu-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.cpu
          type: metrics
        metricsets:
          - cpu
        cpu.metrics:
          - percentages
          - normalized_percentages
        period: 10s
      - id: system/metrics-system.diskio-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.diskio
          type: metrics
        metricsets:
          - diskio
        diskio.include_devices: null
        period: 10s
      - id: system/metrics-system.filesystem-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.filesystem
          type: metrics
        metricsets:
          - filesystem
        period: 1m
        processors:
          - drop_event.when.regexp:
              system.filesystem.mount_point: ^/(sys|cgroup|proc|dev|etc|host|lib|snap)($|/)
      - id: system/metrics-system.fsstat-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.fsstat
          type: metrics
        metricsets:
          - fsstat
        period: 1m
        processors:
          - drop_event.when.regexp:
              system.fsstat.mount_point: ^/(sys|cgroup|proc|dev|etc|host|lib|snap)($|/)
      - id: system/metrics-system.load-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.load
          type: metrics
        metricsets:
          - load
        condition: '${host.platform} != ''windows'''
        period: 10s
      - id: system/metrics-system.memory-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.memory
          type: metrics
        metricsets:
          - memory
        period: 10s
      - id: system/metrics-system.network-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.network
          type: metrics
        metricsets:
          - network
        period: 10s
        network.interfaces: null
      - id: system/metrics-system.process-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.process
          type: metrics
        metricsets:
          - process
        period: 10s
        process.include_top_n.by_cpu: 5
        process.include_top_n.by_memory: 5
        process.cmdline.cache.enabled: true
        process.cgroups.enabled: false
        process.include_cpu_ticks: false
        processes:
          - .*
      - id: >-
          system/metrics-system.process.summary-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.process.summary
          type: metrics
        metricsets:
          - process_summary
        period: 10s
      - id: >-
          system/metrics-system.socket_summary-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.socket_summary
          type: metrics
        metricsets:
          - socket_summary
        period: 10s
      - id: system/metrics-system.uptime-b53e476d-1bdb-445a-b1a5-5ec336c7c9f6
        data_stream:
          dataset: system.uptime
          type: metrics
        metricsets:
          - uptime
        period: 10s
  - id: docker/metrics-docker-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
    name: docker-1
    revision: 1
    type: docker/metrics
    use_output: default
    meta:
      package:
        name: docker
        version: 2.7.0
    data_stream:
      namespace: default
    package_policy_id: 69ddbdc7-6e78-4fe5-a413-ade53b9a7def
    streams:
      - id: docker/metrics-docker.container-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.container
          type: metrics
        metricsets:
          - container
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
      - id: docker/metrics-docker.cpu-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.cpu
          type: metrics
        metricsets:
          - cpu
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
      - id: docker/metrics-docker.diskio-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.diskio
          type: metrics
        metricsets:
          - diskio
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
        skip_major:
          - 9
          - 253
      - id: docker/metrics-docker.event-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.event
          type: metrics
        metricsets:
          - event
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
      - id: docker/metrics-docker.healthcheck-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.healthcheck
          type: metrics
        metricsets:
          - healthcheck
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
      - id: docker/metrics-docker.info-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.info
          type: metrics
        metricsets:
          - info
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      - id: docker/metrics-docker.memory-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.memory
          type: metrics
        metricsets:
          - memory
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
      - id: docker/metrics-docker.network-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
        data_stream:
          dataset: docker.network
          type: metrics
        metricsets:
          - network
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        labels.dedot: true
  - id: filestream-docker-69ddbdc7-6e78-4fe5-a413-ade53b9a7def
    name: docker-1
    revision: 1
    type: filestream
    use_output: default
    meta:
      package:
        name: docker
        version: 2.7.0
    data_stream:
      namespace: default
    package_policy_id: 69ddbdc7-6e78-4fe5-a413-ade53b9a7def
    streams:
      - id: 'docker-container-logs-${docker.container.name}-${docker.container.id}'
        data_stream:
          dataset: docker.container_logs
          type: logs
        paths:
          - '/var/lib/docker/containers/${docker.container.id}/*-json.log'
        parsers:
          - container:
              stream: all
              format: docker
