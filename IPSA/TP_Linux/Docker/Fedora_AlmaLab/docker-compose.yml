version: "3.9"

services:

  server:
    build: ./almalinux-server
    container_name: almalinux_server
    hostname: ipa.lab.local
    privileged: true
    networks:
      labnet:
        ipv4_address: 172.20.0.10
    ports:
      - "8080:80"
      - "8443:443"

  client1:
    build: ./fedora-client
    container_name: fedora_client1
    hostname: client1.lab.local
    networks:
      labnet:
        ipv4_address: 172.20.0.21

  client2:
    build: ./fedora-client
    container_name: fedora_client2
    hostname: client2.lab.local
    networks:
      labnet:
        ipv4_address: 172.20.0.22

networks:
  labnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24